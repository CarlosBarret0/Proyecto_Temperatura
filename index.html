<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medición de Temperatura River Supply</title>
    <link rel="icon" type="image/png" href="logoSupply.png">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- Removed Supabase CDN to use native fetch -->
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Glassmorphism Card Utility */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }

        /* Header / Latest Temp */
        .header-section {
            text-align: center;
        }

        .header-section h1 {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .temp-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .temp-value {
            font-size: 6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .temp-unit {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }

        .last-update {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Chart Section */
        .chart-container {
            position: relative;
            height: 40vh;
            width: 100%;
        }

        /* Action Section */
        .action-section {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
            margin-bottom: 3rem;
        }

        .btn-download {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #4338ca, #2563eb);
        }

        .btn-download:active {
            transform: translateY(1px);
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
        }
        
        .loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .temp-value { font-size: 4.5rem; }
            .temp-unit { font-size: 2rem; }
            .container { width: 95%; gap: 1.5rem; margin: 1rem auto; }
            .glass-card { padding: 1.5rem; }
            .chart-container { height: 35vh; }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: #38bdf8; font-weight: 600;">Generando Excel...</p>
    </div>

    <div class="container">
        <!-- Top Section: Current Temp -->
        <div class="glass-card header-section">
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                <img src="logoSupply.png" alt="Logo River Supply" style="height: 50px; object-fit: contain; border-radius: 8px;"> 
                Medición de Temperatura River Supply
            </h1>
            <div class="temp-display">
                <span class="temp-value" id="current-temp">--.-</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="last-update">
                <div class="pulse-dot"></div>
                <span id="last-update-time">Actualizando...</span>
            </div>
        </div>

        <!-- Middle Section: Chart -->
        <div class="glass-card">
            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>
        </div>

        <!-- Bottom Section: Actions -->
        <div class="action-section">
            <button class="btn-download" onclick="descargarHistorial()">
                <i class="fa-solid fa-file-excel"></i>
                Ver Todo el Historial
            </button>
        </div>
    </div>

    <script>
        // Supabase Credentials
        const SUPABASE_URL = "https://llgrkpkrjuuwkwluzset.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-ryOIxdsqOEa_pW-hcPgRA_p8kYo9qW";

        // Chart Global Variable
        let tempChart;

        // Formats ISO date to readable Asuncion time format
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('es-PY', {
                timeZone: 'America/Asuncion',
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });
        }
        
        // Formats date just for the chart (shorter)
        function formatChartTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('es-PY', {
                timeZone: 'America/Asuncion',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });
        }

        // Equivalent to consultar_datos(x)
        async function consultarDatos(x) {
            let url = `${SUPABASE_URL}/rest/v1/lecturas?select=id,created_at,temperatura&order=created_at.desc`;
            if (x > 0) {
                url += `&limit=${x}`;
            }

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error("Error fetching data:", error);
                return [];
            }
        }

        // Update the top temperature widget (consultar_datos(1))
        async function updateCurrentTemp() {
            const data = await consultarDatos(1);
            if (data && data.length > 0) {
                const latest = data[0];
                const tempEl = document.getElementById('current-temp');
                
                // Formateamos a 1 decimal
                const newVal = parseFloat(latest.temperatura).toFixed(1);
                tempEl.innerText = newVal;
                
                document.getElementById('last-update-time').innerText = `Última lectura: ${formatTime(latest.created_at)}`;
            }
        }

        // Update the chart (consultar_datos(20))
        async function updateChart() {
            const data = await consultarDatos(20);
            if (!data || data.length === 0) return;

            // Invertimos los datos para que el gráfico vaya de más antiguo a más nuevo (de izq a der)
            const chartData = data.reverse();
            
            const labels = chartData.map(d => formatChartTime(d.created_at));
            const temps = chartData.map(d => d.temperatura);

            if (tempChart) {
                tempChart.data.labels = labels;
                tempChart.data.datasets[0].data = temps;
                tempChart.update();
            } else {
                const ctx = document.getElementById('tempChart').getContext('2d');
                
                // Create gradient for the line area
                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, 'rgba(56, 189, 248, 0.5)');
                gradient.addColorStop(1, 'rgba(56, 189, 248, 0.0)');

                tempChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Temperatura (°C)',
                            data: temps,
                            borderColor: '#38bdf8',
                            backgroundColor: gradient,
                            borderWidth: 3,
                            pointBackgroundColor: '#0f172a',
                            pointBorderColor: '#38bdf8',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.4 // This makes the line wavy/smooth! (líneas onduladas)
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                titleColor: '#94a3b8',
                                bodyColor: '#f8fafc',
                                padding: 12,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return `${context.parsed.y} °C`;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#94a3b8',
                                    maxTicksLimit: 8
                                }
                            },
                            y: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#94a3b8',
                                    callback: function(value) {
                                        return value + '°';
                                    }
                                }
                            }
                        },
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        },
                    }
                });
            }
        }

        // Fetch all rows from Supabase (bypassing the 1000 row limit via pagination)
        async function fetchAllData() {
            let allData = [];
            let offset = 0;
            const limit = 1000;
            let hasMore = true;

            while (hasMore) {
                let url = `${SUPABASE_URL}/rest/v1/lecturas?select=id,created_at,temperatura&order=created_at.desc&limit=${limit}&offset=${offset}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                if (data.length > 0) {
                    allData = allData.concat(data);
                    offset += limit;
                }
                
                if (data.length < limit) {
                    hasMore = false;
                }
            }
            return allData;
        }

        // Generate Excel
        async function descargarHistorial() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            try {
                // Get ALL data bypassing limits
                const data = await fetchAllData();
                
                if (!data || data.length === 0) {
                    alert("No hay datos para descargar.");
                    return;
                }

                // Format data for Excel
                const excelData = data.map(row => ({
                    "ID": row.id,
                    "Hora Local": formatTime(row.created_at),
                    "Temperatura": row.temperatura
                }));

                // Create worksheet
                const ws = XLSX.utils.json_to_sheet(excelData);
                
                // Adjust column widths
                const wscols = [
                    {wch: 10}, // ID
                    {wch: 25}, // Hora Local
                    {wch: 15}  // Temperatura
                ];
                ws['!cols'] = wscols;

                // Create workbook and export
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Historial_Temperatura");
                
                const dateStr = new Date().toISOString().slice(0,10);
                XLSX.writeFile(wb, `historial_temperatura_${dateStr}.xlsx`);
                
            } catch (error) {
                console.error("Error generating Excel:", error);
                alert("Ocurrió un error al generar el archivo.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        // Initial Data Load
        async function init() {
            await updateCurrentTemp();
            await updateChart();
            
            // Set intervals for auto-update
            // Update every 10 seconds as requested
            setInterval(() => {
                updateCurrentTemp();
                updateChart();
            }, 10000); 
        }

        // Start app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
